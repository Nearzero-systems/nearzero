name: Pull Request

on:
  pull_request:
    branches: [main, nightly]

permissions:
  contents: read

jobs:
  pr-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job: [build, test, typecheck, "verify:edition-split", "verify:oss-install"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.4.0
      
      - name: Install checksum-pinned build tools
        if: matrix.job == 'test'
        run: |
          sudo sh scripts/install-verified-build-tools.sh nixpacks railpack
          nixpacks --version
          railpack --version
      
      - name: Initialize Docker Swarm
        if: matrix.job == 'test'
        run: |
          docker swarm init
          docker network create --driver overlay nearzero-network || true
          echo "✅ Docker Swarm initialized"
      
      - run: bun install --frozen-lockfile
      - run: bun run server:build
      - run: bun run ${{ matrix.job }}
