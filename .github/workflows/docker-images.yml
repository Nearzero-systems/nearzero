name: Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional release version, for example v0.0.1"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: nearzero-systems
  R2_BUCKET: nearzero
  CLOUDFLARE_ACCOUNT_ID: 2888ec0ba25e82e4c0f3819aaceca38e

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nearzero
            file: Dockerfile
            image: nearzero
          - name: monitoring
            file: Dockerfile.monitoring
            image: monitoring
          - name: schedule
            file: Dockerfile.schedule
            image: schedule
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image-tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          release_version="${{ github.event.inputs.release_version || '' }}"
          if [[ -z "$release_version" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME}"
          fi
          release_version="${release_version#v}"

          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}:latest"
            echo "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}:sha-${short_sha}"
            if [[ -n "$release_version" ]]; then
              echo "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}:${release_version}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}

  publish-install-script:
    name: Publish install.sh to R2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - id: release
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          release_version="${{ github.event.inputs.release_version || '' }}"
          if [[ -z "$release_version" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME}"
          fi
          release_version="${release_version#v}"

          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Upload latest installer
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ env.R2_BUCKET }}/install.sh --remote --file scripts/install.sh --content-type text/x-shellscript --cache-control no-cache

      - name: Upload SHA-pinned installer
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ env.R2_BUCKET }}/releases/sha-${{ steps.release.outputs.short_sha }}/install.sh --remote --file scripts/install.sh --content-type text/x-shellscript --cache-control "public, max-age=31536000, immutable"

      - name: Upload versioned installer
        if: steps.release.outputs.release_version != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put ${{ env.R2_BUCKET }}/releases/${{ steps.release.outputs.release_version }}/install.sh --remote --file scripts/install.sh --content-type text/x-shellscript --cache-control "public, max-age=31536000, immutable"
